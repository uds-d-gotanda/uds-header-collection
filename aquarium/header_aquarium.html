<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Digital Aquarium - Stable Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-default: #1e293b; /* 通常時の深い色 */
            /* 濃いめのグラデーションパレット */
            --grad-1: #1e40af; /* Deep Blue */
            --grad-2: #0e7490; /* Deep Cyan */
            --grad-3: #6b21a8; /* Deep Purple */
            --grad-4: #9d174d; /* Deep Pink/Magenta */
        }
        
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'Inter', sans-serif;
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .edge-fade {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, var(--bg-color) 0%, transparent 10%, transparent 90%, var(--bg-color) 100%);
            z-index: 4;
            pointer-events: none;
        }

        .text-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            pointer-events: auto;
            width: 100%;
            text-align: center;
        }

        @keyframes flow {
            to { background-position: 200% center; }
        }

        .it-title {
            display: inline-block;
            /* 文字サイズを少し小さめに調整 */
            font-size: clamp(120px, 28vw, 320px);
            font-weight: 900;
            letter-spacing: -0.06em;
            line-height: 0.8;
            user-select: none;
            cursor: default;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1), filter 0.6s ease, color 0.4s ease;
            
            /* 通常時は濃い単色 */
            color: var(--text-default);
            background: none;
            -webkit-background-clip: initial;
            -webkit-text-fill-color: initial;
            
            filter: drop-shadow(0 5px 10px rgba(0, 0, 0, 0.05));
        }

        /* ホバー時：グラデーションの変化を少し遅く */
        .it-title:hover {
            transform: scale(1.03);
            background: linear-gradient(
                to right, 
                var(--grad-1) 0%, 
                var(--grad-2) 25%, 
                var(--grad-3) 50%, 
                var(--grad-4) 75%, 
                var(--grad-1) 100%
            );
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: flow 5s linear infinite; /* 速度をゆったりと */
            
            filter: drop-shadow(0 15px 30px rgba(30, 64, 175, 0.3));
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            pointer-events: none;
            background: radial-gradient(circle at 30% 20%, rgba(255,255,255,0.4) 0%, transparent 50%);
        }
    </style>
</head>
<body>

    <div class="edge-fade"></div>
    <div class="overlay"></div>
    <canvas id="canvas"></canvas>

    <div class="text-container">
        <h1 class="it-title" id="it-text">IT</h1>
    </div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let fishes = [];
    let ripples = [];
    let mouse = { x: -1000, y: -1000 };

    window.addEventListener('resize', init);
    
    const handleInput = (x, y, isClick = false) => {
        const rect = canvas.getBoundingClientRect();
        const touchX = x - rect.left;
        const touchY = y - rect.top;
        mouse.x = touchX;
        mouse.y = touchY;
        if (isClick || Math.random() > 0.85) createRipple(touchX, touchY, isClick);
    };

    window.addEventListener('mousemove', (e) => handleInput(e.clientX, e.clientY));
    window.addEventListener('mousedown', (e) => handleInput(e.clientX, e.clientY, true));
    window.addEventListener('touchstart', (e) => {
        const touch = e.touches[0];
        handleInput(touch.clientX, touch.clientY, true);
    }, {passive: true});

    function createRipple(x, y, isBig = false) {
        ripples.push({ x, y, r: 0, opacity: 0.4, speed: isBig ? 3.5 : 1.2, maxR: isBig ? 250 : 70 });
    }

    class Fish {
        constructor(isRed = false) {
            this.isRed = isRed;
            this.init();
        }

        init() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.angle = (Math.random() - 0.5) * 0.5; 
            this.speed = Math.random() * 0.4 + 0.3;
            this.size = Math.random() * (canvas.width < 600 ? 8 : 12) + 8;
            
            if (this.isRed) {
                // ランダムな1匹の赤い魚（少し目立つように透明度を高めに設定）
                this.color = `rgba(220, 38, 38, ${Math.random()*0.2 + 0.4})`;
            } else {
                // 通常の青系の魚
                this.color = `rgba(30, 64, 175, ${Math.random()*0.3 + 0.1})`;
            }
        }

        update() {
            const dx = this.x - mouse.x;
            const dy = this.y - mouse.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            
            const reactionDist = 120;
            const reactionSpeed = 2.8;

            if (dist < reactionDist) {
                this.angle += (Math.atan2(dy, dx) - this.angle) * 0.12;
                this.speed = reactionSpeed;
            } else {
                const targetSpeed = 0.6;
                this.speed += (targetSpeed - this.speed) * 0.02;
                const wobble = 0.035;
                this.angle += (Math.random() - 0.5) * wobble;
                
                if (Math.cos(this.angle) < 0) this.angle += 0.06;
            }

            this.x += Math.cos(this.angle) * this.speed;
            this.y += Math.sin(this.angle) * this.speed;

            if (this.x > canvas.width + 50) this.x = -50;
            if (this.x < -50) this.x = canvas.width + 50;
            if (this.y > canvas.height + 50) this.y = -50;
            if (this.y < -50) this.y = canvas.height + 50;
        }

        draw() {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.angle);
            
            ctx.fillStyle = this.color;
            ctx.beginPath();
            // ボディを描画
            ctx.moveTo(this.size * 1.5, 0);
            ctx.quadraticCurveTo(0, this.size * 0.7, -this.size, 0);
            ctx.quadraticCurveTo(0, -this.size * 0.7, this.size * 1.5, 0);
            ctx.fill();

            // 尾びれを追加してディテールを強化
            ctx.beginPath();
            ctx.moveTo(-this.size, 0);
            ctx.lineTo(-this.size * 1.4, -this.size * 0.4);
            ctx.lineTo(-this.size * 1.4, this.size * 0.4);
            ctx.closePath();
            ctx.fill();

            ctx.restore();
        }
    }

    function init() {
        const w = window.innerWidth;
        const h = window.innerHeight;
        if (w <= 0 || h <= 0) return;

        canvas.width = w;
        canvas.height = h;
        const count = Math.max(12, Math.floor((canvas.width * canvas.height) / 18000));
        
        fishes = [];
        // 群れの中からランダムに1匹だけ赤色に選出
        const redFishIndex = Math.floor(Math.random() * count);
        
        for (let i = 0; i < count; i++) {
            fishes.push(new Fish(i === redFishIndex));
        }
    }

    function animate() {
        ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        fishes.forEach(f => { f.update(); f.draw(); });

        ripples.forEach((r, i) => {
            r.r += r.speed; r.opacity -= 0.008;
            ctx.strokeStyle = `rgba(0, 120, 255, ${r.opacity})`;
            ctx.beginPath(); ctx.arc(r.x, r.y, r.r, 0, Math.PI * 2); ctx.stroke();
            if (r.opacity <= 0) ripples.splice(i, 1);
        });
        
        requestAnimationFrame(animate);
    }

    if (document.fonts && document.fonts.ready) {
        document.fonts.ready.then(() => {
            init();
            animate();
        });
    } else {
        init();
        animate();
    }
</script>
</body>
</html>
